<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cub.V2 - The Watching Eye</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;cursor:crosshair}
canvas{display:block}
#loader{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#00ff88;font-family:'Times New Roman',serif;transition:opacity 2s ease;pointer-events:none}
#loader.hidden{opacity:0}
#loader h1{font-size:clamp(1.2rem,4vw,2.5rem);letter-spacing:1em;font-weight:100;margin-left:1em;opacity:0;animation:fadeIn 1s .3s forwards}
#loader p{font-size:.7rem;opacity:0;margin-top:3em;letter-spacing:.5em;animation:fadeIn 1s 1.2s forwards}
.bar{width:clamp(80px,20vw,160px);height:1px;background:#00ff8822;margin-top:2em;position:relative;overflow:hidden;opacity:0;animation:fadeIn 1s .6s forwards}
.bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:#00ff88;animation:load 2.5s .6s ease forwards}
@keyframes load{to{left:100%}}
@keyframes fadeIn{to{opacity:1}}
@media(max-width:600px){#loader h1{letter-spacing:.5em;margin-left:.5em}}
</style>
</head>
<body>
<div id="loader">
<h1>AWAKENING</h1>
<div class="bar"></div>
<p>The eye opens</p>
</div>
<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const $=id=>document.getElementById(id),loader=$('loader');
const done=()=>loader.classList.add('hidden');
addEventListener('error',done);addEventListener('unhandledrejection',done);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);
scene.fog=new THREE.FogExp2(0x000000,0.015);

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1.2,7.5);

const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
document.body.prepend(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.55,.12,.04);
composer.addPass(bloom);
composer.addPass(new OutputPass());

try{
function createEnvMap(){const s=256;const f=[];for(let i=0;i<6;i++){const c=document.createElement('canvas');c.width=s;c.height=s;const g=c.getContext('2d');const gr=g.createLinearGradient(0,0,0,s);gr.addColorStop(0,'#000005');gr.addColorStop(.3,'#000010');gr.addColorStop(.6,'#050008');gr.addColorStop(.8,'#100005');gr.addColorStop(1,'#1a0005');g.fillStyle=gr;g.fillRect(0,0,s,s);for(let j=0;j<30;j++){g.fillStyle=`rgba(255,255,255,${Math.random()*.12})`;g.fillRect(Math.random()*s,Math.random()*s,2,2);}f.push(new THREE.CanvasTexture(c));}return new THREE.CubeTexture(f);}
const envMap=createEnvMap();scene.environment=envMap;

scene.add(new THREE.AmbientLight(0x050508,.6));

const lavaDir=new THREE.DirectionalLight(0xff3300,3);lavaDir.position.set(0,-4,1.5);scene.add(lavaDir);
const eyePt=new THREE.PointLight(0x00ff66,4,10);eyePt.position.set(0,0,1.2);scene.add(eyePt);
const fillLight=new THREE.DirectionalLight(0x002244,.4);fillLight.position.set(-3,4,5);scene.add(fillLight);
const backLight=new THREE.DirectionalLight(0x440022,.3);backLight.position.set(0,1,-6);scene.add(backLight);

const mouse={x:0,y:0,tx:0,ty:0};
addEventListener('mousemove',e=>{mouse.tx=(e.clientX/innerWidth)*2-1;mouse.ty=-(e.clientY/innerHeight)*2+1});
addEventListener('touchmove',e=>{const t=e.touches[0];mouse.tx=(t.clientX/innerWidth)*2-1;mouse.ty=-(t.clientY/innerHeight)*2+1},{passive:true});

const clock=new THREE.Clock();

const sphereVS=`varying vec3 vPos;varying vec3 vNorm;varying vec3 vV;varying vec3 vWPos;varying vec3 vWNorm;
void main(){vPos=position;vNorm=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.);vV=-mv.xyz;vec4 wp=modelMatrix*vec4(position,1.);vWPos=wp.xyz;vWNorm=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*mv;}`;

const sphereFS=`uniform float uT;uniform vec3 uRim;uniform vec3 uGlow;uniform samplerCube envMap;
varying vec3 vPos;varying vec3 vNorm;varying vec3 vV;varying vec3 vWPos;varying vec3 vWNorm;
float h(vec3 p){p=fract(p*.3183+.1);p*=17.;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float n(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
return mix(mix(mix(h(i+vec3(0,0,0)),h(i+vec3(1,0,0)),f.x),mix(h(i+vec3(0,1,0)),h(i+vec3(1,1,0)),f.x),f.y),mix(mix(h(i+vec3(0,0,1)),h(i+vec3(1,0,1)),f.x),mix(h(i+vec3(0,1,1)),h(i+vec3(1,1,1)),f.x),f.y),f.z);}
float f(vec3 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*n(p);p*=2.1;a*=.45;}return v;}
void main(){vec3 d=normalize(vPos);float aZ=acos(clamp(d.z,-1.,1.));
float nn=f(vPos*1.2+uT*.03);float op=.47+nn*.1;if(aZ<op)discard;
float ed=exp(-abs(aZ-op)*35.);float sf=f(vPos*2.5+1.);float vs=smoothstep(.55,.7,sf);
vec3 N=normalize(vNorm),V=normalize(vV);
vec3 LD=normalize(vec3(0.,-1.,.5));float ld=max(dot(N,-LD),0.);
vec3 ED=normalize(vec3(0.,0.,1.));float edot=max(dot(N,ED),0.);
vec3 H=normalize(LD+V);float sp=pow(max(dot(N,H),0.),32.);
vec3 bs=vec3(.02,.02,.025);
vec3 lc=vec3(.8,.15,.02),ec=vec3(0.,.8,.3);
vec3 df=lc*ld*.6+ec*edot*.3;
vec3 sc=vec3(.3,.25,.2);vec3 spc=sc*sp*.5;
vec3 amb=vec3(.012,.008,.015);
float ri=1.-max(dot(V,N),0.);
vec3 rc=uRim*pow(ri,4.)*.5;
vec3 gg=uGlow*ed*1.8;vec3 vg=uGlow*vs*.12;
vec3 c=bs*(amb+.4)+df+spc+rc+gg+vg;
float fr=pow(1.-max(dot(V,N),0.),3.);
c+=mix(vec3(.02),uGlow*.25,fr);if(!gl_FrontFacing)c+=uGlow*.5;
vec3 wN=normalize(vWNorm);vec3 wV=normalize(cameraPosition-vWPos);
vec3 refl=reflect(-wV,wN);vec3 env=textureCube(envMap,refl).rgb;
c=mix(c,env*.04,.25);
gl_FragColor=vec4(c,1.);}`;

const sphereM=new THREE.ShaderMaterial({
vertexShader:sphereVS,fragmentShader:sphereFS,
uniforms:{uT:{value:0},uRim:{value:new THREE.Color(0xff3300)},uGlow:{value:new THREE.Color(0x00ff66)},envMap:{value:envMap}},
side:THREE.DoubleSide});
const sphere=new THREE.Mesh(new THREE.SphereGeometry(2.2,96,96),sphereM);
scene.add(sphere);

const eVS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const eFS=`uniform vec2 uM;uniform float uT;uniform vec2 uR;varying vec2 vUv;
float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
float f(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.;a*=.5;}return v;}
void main(){vec2 uv=vUv-.5;uv.x*=uR.x/uR.y;
vec2 off=uM*.12;vec2 iuv=uv+off;
float d=length(uv),id=length(iuv);
float pp=.12+sin(uT*.4)*.015;float pu=1.-smoothstep(0.,pp,id);
float pg=exp(-id*25.)-exp(-id*50.);
float irO=.4,irI=pp;float ir=1.-smoothstep(irI,irO,id);
float a=atan(iuv.y,iuv.x);float fb=sin(a*24.+id*20.+uT*.2)*.5+.5;fb*=1.-(id-irI)/(irO-irI);
float rg=sin(id*100.-uT*.5)*.5+.5;rg=smoothstep(.3,.7,rg);
float og=f(iuv*10.+uT*.03);
vec3 dg=vec3(0.,.25,.08),mg=vec3(0.,.55,.2),bg=vec3(.05,.9,.35),gd=vec3(.7,.6,.05),am=vec3(.6,.35,.05);
vec3 ic=mix(dg,mg,fb);ic=mix(ic,bg,rg*.4);ic=mix(ic,gd,og*.2*fb);ic=mix(ic,am,og*.1*(1.-fb));
float lm=smoothstep(irO-.03,irO,id);ic=mix(ic,vec3(0.,.1,.02),lm*.6);
vec3 sc=vec3(.04,.05,.06);float sl=1.-smoothstep(irO,.5,d);
vec3 c=mix(sc,ic,ir);c=mix(c,vec3(0.),pu);
c+=vec3(0.,.6,.2)*pg*1.5;
vec2 s1=uv-vec2(.12,-.08);float sd1=length(s1);float sp1=exp(-sd1*sd1*250.);c+=vec3(1.,.98,.95)*sp1*.9;
vec2 s2=uv-vec2(-.18,.12);float sd2=length(s2);float sp2=exp(-sd2*sd2*180.);c+=vec3(.7,.85,.9)*sp2*.3;
float gl=exp(-d*8.)*.12;c+=vec3(0.,.7,.25)*gl;
float vs=f(vec2(uv.x*40.,uv.y*6.+uT*.05));vs=smoothstep(.65,.8,vs);c=mix(c,vec3(.08,.01,.01),vs*(1.-ir)*.25);
gl_FragColor=vec4(c,1.);}`;

const eyeM=new THREE.ShaderMaterial({
vertexShader:eVS,fragmentShader:eFS,
uniforms:{uM:{value:new THREE.Vector2},uT:{value:0},uR:{value:new THREE.Vector2(innerWidth,innerHeight)}},
side:THREE.DoubleSide,transparent:true,depthWrite:true});
const eye=new THREE.Mesh(new THREE.CircleGeometry(.85,48),eyeM);
eye.position.set(0,0,1.4);
scene.add(eye);

const auraM=new THREE.ShaderMaterial({
vertexShader:eVS,
fragmentShader:`varying vec2 vUv;void main(){vec2 uv=vUv-.5;float d=length(uv);float a=exp(-d*d*6.)*.25;gl_FragColor=vec4(0.,.8,.3,a);}`,
transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
const aura=new THREE.Mesh(new THREE.CircleGeometry(1.2,32),auraM);
aura.position.set(0,0,1.35);
scene.add(aura);

function pt(){const c=document.createElement('canvas');c.width=64;c.height=64;
const g=c.getContext('2d'),gr=g.createRadialGradient(32,32,0,32,32,32);
gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(.15,'rgba(255,200,100,.8)');gr.addColorStop(1,'rgba(255,100,0,0)');
g.fillStyle=gr;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const ptTex=pt();

const emberCount=600,embPos=new Float32Array(emberCount*3),embBase=new Float32Array(emberCount*2),embSp=new Float32Array(emberCount),embPh=new Float32Array(emberCount);
for(let i=0;i<emberCount;i++){const ta=Math.random()*Math.PI*2,r=.8+Math.random()*3.5;
embPos[i*3]=Math.cos(ta)*r;embPos[i*3+1]=-3+Math.random()*3;embPos[i*3+2]=Math.sin(ta)*r-1;
embBase[i*2]=embPos[i*3];embBase[i*2+1]=embPos[i*3+2];
embSp[i]=.15+Math.random()*.35;embPh[i]=Math.random()*6;}
const embGeo=new THREE.BufferGeometry();
embGeo.setAttribute('position',new THREE.BufferAttribute(embPos,3));
const embMat=new THREE.PointsMaterial({size:.1,map:ptTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,color:0xff4400,opacity:.5,sizeAttenuation:true});
const embers=new THREE.Points(embGeo,embMat);
scene.add(embers);

const spCount=300,spPos=new Float32Array(spCount*3),spBase=new Float32Array(spCount*3),spPh=new Float32Array(spCount);
for(let i=0;i<spCount;i++){const ta=Math.random()*Math.PI*2,r=.5+Math.random()*2;
const x=Math.cos(ta)*r*(.5+Math.random()*.5),y=(Math.random()-.5)*1.5,z=Math.sin(ta)*r*(.5+Math.random()*.5)+.5;
spPos[i*3]=x;spPos[i*3+1]=y;spPos[i*3+2]=z;
spBase[i*3]=x;spBase[i*3+1]=y;spBase[i*3+2]=z;
spPh[i]=Math.random()*Math.PI*2;}
const spGeo=new THREE.BufferGeometry();
spGeo.setAttribute('position',new THREE.BufferAttribute(spPos,3));
const spMat=new THREE.PointsMaterial({size:.06,map:ptTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,color:0x00ff66,opacity:.7,sizeAttenuation:true});
const sparkles=new THREE.Points(spGeo,spMat);
scene.add(sparkles);

const runeChars=['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛝ','ᛟ','ᛞ','ᛜ','ᛠ'];
function mkRune(c){const ca=document.createElement('canvas');ca.width=64;ca.height=64;
const g=ca.getContext('2d'),gr=g.createRadialGradient(32,32,0,32,32,32);
gr.addColorStop(0,'rgba(0,255,100,1)');gr.addColorStop(.25,'rgba(0,255,100,.7)');gr.addColorStop(1,'rgba(0,255,100,0)');
g.fillStyle=gr;g.fillRect(0,0,64,64);
g.fillStyle='#00ff88';g.font='bold 30px serif';g.textAlign='center';g.textBaseline='middle';g.fillText(c,32,32);
const tex=new THREE.CanvasTexture(ca);const m=new THREE.SpriteMaterial({map:tex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
return new THREE.Sprite(m);}

function ring(rad,tube,tiltX,tiltZ,count){
const g=new THREE.Group();
const r=new THREE.Mesh(new THREE.TorusGeometry(rad,tube,12,64),new THREE.MeshStandardMaterial({color:0x111111,metalness:.9,roughness:.3,side:THREE.DoubleSide}));
g.add(r);
for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2;
const sp=mkRune(runeChars[i%runeChars.length]);
sp.position.set(rad*Math.cos(a),tube/2,rad*Math.sin(a));
sp.scale.set(.28,.28,1);g.add(sp);}
g.rotation.x=tiltX;g.rotation.z=tiltZ;
g.userData={spd:(.06+.04*Math.random())*(Math.random()<.5?1:-1)};
return g;}

const rings=[];
rings.push(ring(3.2,.08,Math.PI/2+.08,0,16));
rings.push(ring(2.9,.06,Math.PI/2+.45,.2,14));
rings.push(ring(2.6,.07,Math.PI/2+.75,.45,12));
rings.push(ring(3.6,.035,Math.PI/2+.2,.7,18));
rings.forEach(r=>scene.add(r));

const floorGlow=new THREE.Mesh(new THREE.RingGeometry(1.5,4,48),new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:.04,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
floorGlow.rotation.x=-Math.PI/2;floorGlow.position.y=-2.2;scene.add(floorGlow);

const greenHalo=new THREE.Mesh(new THREE.RingGeometry(2.3,2.6,64),new THREE.MeshBasicMaterial({color:0x00ff66,transparent:true,opacity:.04,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));
greenHalo.rotation.x=Math.PI/2;greenHalo.position.z=-.1;scene.add(greenHalo);

// God rays
const rayVS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const rayFS=`varying vec2 vUv;uniform float uT;void main(){vec2 uv=vUv-.5;float d=abs(uv.x);float a=exp(-d*25.)*exp(-abs(uv.y)*2.)*.12*(.8+.2*sin(uT*1.5+uv.y*10.));gl_FragColor=vec4(0.,.7,.3,a);}`;
const rayMat=new THREE.ShaderMaterial({vertexShader:rayVS,fragmentShader:rayFS,uniforms:{uT:{value:0}},transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
const godRays=[];
for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;const m=new THREE.Mesh(new THREE.PlaneGeometry(.12,4),rayMat.clone());
m.position.set(0,0,2.0);m.rotation.x=Math.PI*.12;m.rotation.z=a;scene.add(m);godRays.push(m);}

setTimeout(()=>loader.classList.add('hidden'),2800);

function animate(){
requestAnimationFrame(animate);
const t=clock.getElapsedTime();

mouse.x+=(mouse.tx-mouse.x)*.05;
mouse.y+=(mouse.ty-mouse.y)*.05;

sphereM.uniforms.uT.value=t;
eyeM.uniforms.uT.value=t;
eyeM.uniforms.uM.value.set(mouse.x,mouse.y);

const br=1+Math.sin(t*.5)*.005;eye.scale.set(br,br,1);
eyePt.intensity=3+Math.sin(t*.3)*1.5;

camera.position.x=Math.sin(t*.08)*.4-mouse.x*.3;
camera.position.y=1.2+Math.sin(t*.12)*.2-mouse.y*.2;
camera.lookAt(0,0,.2);

sphere.position.y=Math.sin(t*.15)*.05;
sphere.position.z=Math.cos(t*.1)*.03;

rings.forEach((r,i)=>{r.rotation.y+=r.userData.spd*.012*(1+i*.2);});
godRays.forEach((m,i)=>{m.material.uniforms.uT.value=t;m.rotation.z+=.003*(1+i%2*2-1);});

const ep=embers.geometry.attributes.position.array;
for(let i=0;i<emberCount;i++){
ep[i*3+1]=((t*embSp[i]+embPh[i])%5)-3;
ep[i*3]=embBase[i*2]+Math.sin(t*embSp[i]+i)*.1;
ep[i*3+2]=embBase[i*2+1]+Math.cos(t*embSp[i]*.7+i)*.08;}
embers.geometry.attributes.position.needsUpdate=true;

const sp=sparkles.geometry.attributes.position.array;
for(let i=0;i<spCount;i++){const ph=spPh[i];
sp[i*3]=spBase[i*3]+Math.sin(t*.5+ph)*.15;
sp[i*3+1]=spBase[i*3+1]+Math.cos(t*.7+ph*1.3)*.1;
sp[i*3+2]=spBase[i*3+2]+Math.sin(t*.4+ph*1.7)*.12;}
sparkles.geometry.attributes.position.needsUpdate=true;

composer.render();
}

animate();

addEventListener('resize',()=>{
const w=innerWidth,h=innerHeight;
camera.aspect=w/h;camera.updateProjectionMatrix();
renderer.setSize(w,h);composer.setSize(w,h);
eyeM.uniforms.uR.value.set(w,h);});
}catch(e){console.error(e);done();}
</script>
</body>
</html>
